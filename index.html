<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presentation Ratings</title>
  <style>
    /* ─── Reset & base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111827;
      font-size: 16px;
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }

    /* ─── Layout ─── */
    #app { max-width: 480px; margin: 0 auto; }

    .screen {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      min-height: 100vh; /* fallback */
    }

    /* ─── Header ─── */
    .header {
      background: #ffffff;
      border-bottom: 1px solid #E5E7EB;
      padding: 12px 16px 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .progress {
      font-size: 14px;
      color: #6B7280;
      margin-top: 6px;
      font-weight: 500;
    }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      line-height: 1;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn:focus-visible {
      outline: 2px solid #3B82F6;
      outline-offset: 2px;
    }

    .btn-primary {
      background: #3B82F6;
      color: #ffffff;
    }
    .btn-primary:hover { background: #2563EB; }
    .btn-primary:active { background: #1D4ED8; }

    .btn-secondary {
      background: #F3F4F6;
      color: #374151;
      border: 1px solid #D1D5DB;
    }
    .btn-secondary:hover { background: #E5E7EB; }

    .btn-outline {
      background: transparent;
      color: #3B82F6;
      border: 1.5px solid #3B82F6;
    }
    .btn-outline:hover { background: #EFF6FF; }

    .btn-ghost {
      background: transparent;
      color: #374151;
      padding: 0 4px;
      min-height: 44px;
    }
    .btn-ghost:hover { color: #111827; }

    /* ─── Student list ─── */
    .student-list {
      list-style: none;
      padding: 12px 16px 32px;
      flex: 1;
    }

    .student-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      background: #ffffff;
      min-height: 68px;
      transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .student-card:hover { background: #F9FAFB; }
    .student-card:active { background: #F3F4F6; transform: scale(0.99); }

    .student-card.rated {
      border-color: #86EFAC;
      background: #F0FDF4;
    }
    .student-card.rated:hover { background: #DCFCE7; }

    .student-card:focus-visible {
      outline: 2px solid #3B82F6;
      outline-offset: 2px;
    }

    .student-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .student-name {
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-chip {
      font-size: 13px;
      color: #15803D;
      font-weight: 600;
    }

    .status-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-rated  { background: #DCFCE7; color: #15803D; }
    .badge-unrated { background: #F3F4F6; color: #6B7280; }

    /* ─── Rating overlay ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .rating-card {
      background: #ffffff;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 36px;
      width: 100%;
      max-height: 92dvh;
      max-height: 92vh; /* fallback */
      overflow-y: auto;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .rating-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .rating-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .close-btn {
      background: #F3F4F6;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 15px;
      color: #6B7280;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .close-btn:hover { background: #E5E7EB; }
    .close-btn:focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; }

    /* Score grid */
    .score-section { margin-bottom: 20px; }

    .score-label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 10px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .score-btn {
      min-height: 52px;
      background: #F3F4F6;
      color: #374151;
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s, color 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }

    .score-btn:hover {
      background: #E5E7EB;
      border-color: #3B82F6;
      color: #3B82F6;
    }

    .score-btn.selected {
      background: #3B82F6;
      color: #ffffff;
      border-color: #3B82F6;
    }

    .score-btn.selected:hover { background: #2563EB; }
    .score-btn:active { transform: scale(0.93); }

    .score-btn:focus-visible {
      outline: 2px solid #3B82F6;
      outline-offset: 2px;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
    .shake { animation: shake 0.35s ease; }

    /* Notes */
    .notes-section { margin-bottom: 24px; }

    .notes-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .optional {
      font-weight: 400;
      color: #9CA3AF;
      font-size: 13px;
    }

    .notes-field {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      color: #111827;
      background: #ffffff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .notes-field::placeholder { color: #9CA3AF; }

    .notes-field:focus {
      outline: none;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .rating-footer {
      display: flex;
      gap: 12px;
    }

    .rating-footer .btn { flex: 1; }

    /* ─── Summary screen ─── */
    .summary-list {
      list-style: none;
      padding: 12px 16px 32px;
    }

    .summary-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 16px;
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      margin-bottom: 8px;
      background: #ffffff;
    }

    .summary-card.unrated {
      opacity: 0.55;
    }

    .summary-rank {
      font-size: 18px;
      font-weight: 700;
      color: #3B82F6;
      min-width: 28px;
      text-align: center;
      padding-top: 1px;
    }

    .summary-content { flex: 1; min-width: 0; }

    .summary-name {
      font-size: 16px;
      font-weight: 600;
    }

    .summary-score {
      font-size: 15px;
      color: #374151;
      margin-top: 2px;
      font-weight: 500;
    }

    .summary-notes {
      font-size: 14px;
      color: #6B7280;
      margin-top: 4px;
      font-style: italic;
      word-break: break-word;
    }

    .summary-unrated-label {
      font-size: 14px;
      color: #9CA3AF;
      margin-top: 2px;
    }

    /* ─── Print styles ─── */
    @media print {
      .btn-ghost,
      .btn-outline[data-action="print"] { display: none !important; }

      .header { position: static; border-bottom: 2px solid #000; }

      .overlay { display: none !important; }

      .summary-card { break-inside: avoid; border: 1px solid #ccc; margin-bottom: 4px; }

      .summary-card.unrated { display: none; }

      body { font-size: 11pt; color: #000; }

      #app { max-width: 100%; }

      .summary-rank { color: #000; }

      .summary-score { color: #000; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
